<!doctype html>
<html lang="en">
  <head>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="stylesheet" href="/index.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Kanit:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
      rel="stylesheet"
    />

    <title>to do List</title>
  </head>
  <body class="container light-mode">
    <header>
      <nav>
        <h1>Todo List</h1>
      </nav>

      <div class="dashboard">
        <form action="">
          <div class="input-wrapper">
            <input
              type="text"
              id="seach"
              name="seach-note"
              placeholder="Nota de pesquisa..."
            />
            <button type="submit"></button>
          </div>
        </form>

        <div class="select">
          <div id="filter-select">
            <input type="checkbox" id="input-view-btn" />

            <div id="select-btn">
              <div id="selected-value">ALL</div>

              <span id="chevrons">
                <img src="/assets/chevron-down.svg" alt="" />
                <img src="/assets/chevron-up.svg" alt="" />
              </span>
            </div>
          </div>

          <ul id="options">
            <li class="option">
              <input type="radio" name="filter" value="all" data-label="All" />
              <span class="label">All</span>
            </li>
            <li class="option">
              <input
                type="radio"
                name="filter"
                value="complete"
                data-label="Complete"
              />
              <span class="label">Complete</span>
            </li>
            <li class="option">
              <input
                type="radio"
                name="filter"
                value="incomplete"
                data-label="Incomplete"
              />
              <span class="label">Incomplete</span>
            </li>
          </ul>
        </div>

        <div class="scheme-mode">
          <input type="checkbox" name="scheme" id="scheme" />
          <img src="/assets/moon.svg" alt="ícone de modo escuro" />
        </div>
      </div>
    </header>

    <main>
      <section class="note-container">
        <!-- <div class="error-message">
          <img src="/assets/error-icon.svg" alt="" />
          <p>Preencha o campo para adicionar uma tarefa!</p>
        </div> -->
        <!-- <div class="sucess-message">
          <img src="/assets/checkbox.svg" alt="" />
          <p>Tarefa concluída com sucesso!</p>
        </div> -->
        <!-- <div class="note-content">
          <div class="note">
            <input type="checkbox" name="checked-task" id="checked" />
            <div class="checkbox"></div>
            <label for="checked">NOTA #1</label>

            <div class="edit-container">
              <input type="text" class="edit-label" />
              <img src="/assets/pencil-hover.svg" alt="" />
            </div>

            <div class="icons-note">
              <span class="icon-pencil"></span>
              <span class="icon-trash"></span>
            </div>
          </div>

          <div class="divisor"></div>
        </div> -->
      </section>
    </main>

    <footer>
      <button type="button" id="add-note">
        <img src="/assets/plus.svg" alt="ícone de adicionar nota" />
      </button>
    </footer>

    <dialog class="invisible">
      <div id="content-pop">
        <form action="" id="new-note-form">
          <label for="new-note">New note</label>
          <input
            type="text"
            name="new-note"
            id="new-note"
            placeholder="Input your note..."
          />
        </form>

        <span id="btn-popup">
          <button type="button" id="close-popup">Cancel</button>
          <button type="submit" id="add-task" form="new-note-form">
            Apply
          </button>
        </span>
      </div>
    </dialog>

    <div class="background-popup invisible"></div>

    <script src="/scripts.js"></script>
  </body>
</html>
