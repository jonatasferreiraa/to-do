<!doctype html>
<html lang="en">
  <head>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="stylesheet" href="/index.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Kanit:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
      rel="stylesheet"
    />

    <title>to do List</title>
  </head>
  <body class="container light-mode">
    <header>
      <nav>
        <h1>Todo List</h1>
      </nav>

      <div class="dashboard">
        <div class="input-wrapper">
          <input
            type="text"
            id="seach"
            name="seach-note"
            placeholder="Nota de pesquisa..."
          />
        </div>

        <div class="select">
          <div id="filter-select">
            <input type="checkbox" id="input-view-btn" />

            <div id="select-btn">
              <div id="selected-value">ALL</div>

              <span id="chevrons">
                <img src="/assets/chevron-down.svg" alt="" />
                <img src="/assets/chevron-up.svg" alt="" />
              </span>
            </div>
          </div>

          <ul id="options">
            <li class="option">
              <input type="radio" name="filter" value="all" data-label="All" />
              <span class="label">All</span>
            </li>
            <li class="option">
              <input
                type="radio"
                name="filter"
                value="complete"
                data-label="Complete"
              />
              <span class="label">Complete</span>
            </li>
            <li class="option">
              <input
                type="radio"
                name="filter"
                value="incomplete"
                data-label="Incomplete"
              />
              <span class="label">Incomplete</span>
            </li>
          </ul>
        </div>

        <div class="scheme-mode">
          <input type="checkbox" name="scheme" id="scheme" />
          <div class="icon-scheme"></div>
        </div>
      </div>
    </header>

    <main>
      <section class="note-container">
        <div class="note-content">
          <div class="note">
            <input type="checkbox" name="checked" id="checked" />
            <label for="checked">NOTA #1</label>
            <span class="icons-note">
              <img src="/assets/pencil.svg" alt="" />
              <img src="/assets/tash.svg" alt="" />
            </span>
          </div>

          <div class="divisor"></div>
        </div>
      </section>
    </main>

    <footer>
      <div class="add-note">
        <img src="/assets/plus.svg" alt="ícone de adicionar nota" />
      </div>
    </footer>
  </body>
</html>
