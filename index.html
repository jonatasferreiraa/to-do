<!doctype html>
<html lang="en">
  <head>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="stylesheet" href="/index.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Kanit:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
      rel="stylesheet"
    />

    <title>to do List</title>
  </head>
  <body class="light-mode">
    <header>
      <nav>
        <h1>Todo List</h1>
      </nav>

      <div class="input-wrapper">
        <input
          type="search"
          id="seach"
          name="seach"
          placeholder="Nota de pesquisa..."
        />

        <select name="note-filter" id="note-filter">
          <option value="all">Todos</option>
          <option value="complete">Completo</option>
          <option value="incomplete">Incompleto</option>
        </select>

        <div class="scheme-mode">
          <input type="checkbox" name="scheme" id="scheme" />
          <div class="icon-scheme"></div>
        </div>
      </div>
    </header>

    <main>
      <div class="note-content">
        <div class="note">
          <input type="checkbox" name="checked" id="checked" />
          <label for="checked">NOTA #1</label>
          <span class="icons-note">
            <img src="/assets/pencil.svg" alt="" />
            <img src="/assets/tash.svg" alt="" />
          </span>
        </div>

        <div class="divisor"></div>
      </div>
    </main>

    <footer>
      <div class="add-note">
        <img src="/assets/plus.svg" alt="ícone de adicionar nota" />
      </div>
    </footer>
  </body>
</html>
